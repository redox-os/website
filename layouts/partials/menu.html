<header>
  <nav>
    <ul class="flex flex-wrap items-center -mx-4 menu">
      <li class="w-full md:w-1/4 px-4 mb-4 md:mb-0">
        <a href="{{ if .Site.LanguagePrefix }}{{ .Site.LanguagePrefix }}{{ else }}/{{ end }}">
            <picture>
                <source srcset="/img/logo-dark.png" media="(prefers-color-scheme: dark)"/>
                <img src="/img/logo.png" width="178" height="64" alt="Redox Logo"/>
            </picture>
        </a>
      </li>
      <li class="w-full md:w-3/4 px-4 menu">
        {{ range .Site.Menus.main }}
          <h2><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></h2>
        {{ end }}
      </li>
    </ul>
  </nav>
</header>
